spring.application.name=quantity-measurement-app
server.port=8080

# Avoid restarts closing requests when the IDE/agent rewrites target/classes (optional)
spring.devtools.restart.enabled=false

spring.datasource.url=jdbc:mysql://mysql.railway.internal:3306/railway
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:XDuSnOcIRBgvemqftCTjFdWdKekqkGCP}

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect


spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false


# JWT + admin login
# Base64 secret, min 32 bytes after decode for HS256. Dev default is 32-byte placeholder.
app.security.jwt.secret-base64=${JWT_SECRET_BASE64:MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTIzNDU2Nzg5MDE=}
app.security.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.security.admin.username=${ADMIN_USERNAME:admin}
app.security.admin.password=${ADMIN_PASSWORD:change-me}
# Empty = JSON token response after Google; else redirect with ?accessToken=
app.security.oauth2-success-redirect=${OAUTH2_SUCCESS_REDIRECT:}
app.security.cors-allowed-origins[0]=http://localhost:3000
app.security.cors-allowed-origins[5]=http://localhost:8080
app.security.cors-allowed-origins[6]=http://localhost:4200
